name: Build OpenWrt XR1710G

on:
  workflow_run:
    workflows:
      - Build OpenWrt XR1710G Toolchain
    types:
      - completed
  workflow_dispatch:
    inputs:
      openwrt_repo:
        description: OpenWrt/ImmortalWrt source repository
        required: true
        #default: https://github.com/YYH2913/openwrt.git
        default: https://github.com/openwrt/openwrt.git
        #default: https://github.com/immortalwrt/immortalwrt.git
      openwrt_ref:
        description: OpenWrt branch, tag, or commit
        required: true
        #default: openwrt-24.10
        default: main
      target_profile:
        description: OpenWrt device profile
        required: true
        default: gemtek_xr1710g-ubi
      wireless_country:
        description: First-boot wireless country code
        required: true
        default: CN
      fix_5g_channel:
        description: Force 5 GHz radio to a non-DFS channel on first boot
        required: true
        type: boolean
        default: true
      extra_config:
        description: Extra OpenWrt .config lines, one per line
        required: false
        default: ""
      create_release:
        description: Publish firmware files as a GitHub Release
        required: true
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: openwrt-xr1710g-check-${{ github.ref }}
  cancel-in-progress: false

env:
  TARGET: airoha
  SUBTARGET: an7581

jobs:
  skip-unsuccessful-toolchain:
    name: Skip firmware after unsuccessful toolchain
    runs-on: ubuntu-24.04-arm
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion != 'success' }}
    steps:
      - name: Report skip
        run: |
          echo "Toolchain workflow ended with conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo "Firmware will run only after a successful toolchain build."

  check-upstream:
    name: Check OpenWrt source
    runs-on: ubuntu-24.04-arm
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      should_build: ${{ steps.decision.outputs.should_build }}
      skip_reason: ${{ steps.decision.outputs.skip_reason }}
      openwrt_repo: ${{ steps.resolve.outputs.openwrt_repo }}
      openwrt_ref: ${{ steps.resolve.outputs.openwrt_ref }}
      target_profile: ${{ steps.resolve.outputs.target_profile }}
      wireless_country: ${{ steps.resolve.outputs.wireless_country }}
      fix_5g_channel: ${{ steps.resolve.outputs.fix_5g_channel }}
      extra_config: ${{ steps.resolve.outputs.extra_config }}
      create_release: ${{ steps.resolve.outputs.create_release }}
      source_commit: ${{ steps.source.outputs.source_commit }}
      source_short: ${{ steps.source.outputs.source_short }}
      safe_ref: ${{ steps.source.outputs.safe_ref }}
      release_tag: ${{ steps.source.outputs.release_tag }}
      cache_week: ${{ steps.source.outputs.cache_week }}

    steps:
      - name: Resolve build inputs
        id: resolve
        env:
          INPUT_OPENWRT_REPO: ${{ inputs.openwrt_repo }}
          INPUT_OPENWRT_REF: ${{ inputs.openwrt_ref }}
          INPUT_TARGET_PROFILE: ${{ inputs.target_profile }}
          INPUT_WIRELESS_COUNTRY: ${{ inputs.wireless_country }}
          INPUT_FIX_5G_CHANNEL: ${{ inputs.fix_5g_channel }}
          INPUT_EXTRA_CONFIG: ${{ inputs.extra_config }}
          INPUT_CREATE_RELEASE: ${{ inputs.create_release }}
          PAYLOAD_OPENWRT_REPO: ${{ github.event.client_payload.openwrt_repo }}
          PAYLOAD_OPENWRT_REF: ${{ github.event.client_payload.openwrt_ref }}
          PAYLOAD_TARGET_PROFILE: ${{ github.event.client_payload.target_profile }}
          PAYLOAD_WIRELESS_COUNTRY: ${{ github.event.client_payload.wireless_country }}
          PAYLOAD_FIX_5G_CHANNEL: ${{ github.event.client_payload.fix_5g_channel }}
          PAYLOAD_EXTRA_CONFIG: ${{ github.event.client_payload.extra_config }}
          PAYLOAD_CREATE_RELEASE: ${{ github.event.client_payload.create_release }}
        run: |
          set -eu
          openwrt_repo="${INPUT_OPENWRT_REPO:-${PAYLOAD_OPENWRT_REPO:-${{ inputs.openwrt_repo }}}}"
          openwrt_ref="${INPUT_OPENWRT_REF:-${PAYLOAD_OPENWRT_REF:-${{ inputs.openwrt_ref }}}}"
          target_profile="${INPUT_TARGET_PROFILE:-${PAYLOAD_TARGET_PROFILE:-gemtek_xr1710g-ubi}}"
          wireless_country="${INPUT_WIRELESS_COUNTRY:-${PAYLOAD_WIRELESS_COUNTRY:-CN}}"
          fix_5g_channel="${INPUT_FIX_5G_CHANNEL:-${PAYLOAD_FIX_5G_CHANNEL:-true}}"
          extra_config="${INPUT_EXTRA_CONFIG:-${PAYLOAD_EXTRA_CONFIG:-}}"
          create_release="${INPUT_CREATE_RELEASE:-${PAYLOAD_CREATE_RELEASE:-true}}"

          case "${target_profile}" in
            gemtek_xr1710g) target_profile="gemtek_xr1710g-ubi" ;;
          esac

          {
            printf 'openwrt_repo=%s\n' "${openwrt_repo}"
            printf 'openwrt_ref=%s\n' "${openwrt_ref}"
            printf 'target_profile=%s\n' "${target_profile}"
            printf 'wireless_country=%s\n' "${wireless_country}"
            printf 'fix_5g_channel=%s\n' "${fix_5g_channel}"
            printf 'create_release=%s\n' "${create_release}"
            printf 'extra_config<<__EXTRA_CONFIG__\n%s\n__EXTRA_CONFIG__\n' "${extra_config}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve OpenWrt commit
        id: source
        env:
          OPENWRT_REPO: ${{ steps.resolve.outputs.openwrt_repo }}
          OPENWRT_REF: ${{ steps.resolve.outputs.openwrt_ref }}
        run: |
          set -eux
          mkdir -p source-probe
          git -C source-probe init
          git -C source-probe remote add origin "${OPENWRT_REPO}"
          git -C source-probe fetch --depth 1 origin "${OPENWRT_REF}"
          source_commit="$(git -C source-probe rev-parse FETCH_HEAD)"
          source_short="$(printf '%s' "${source_commit}" | cut -c1-12)"
          safe_ref="$(printf '%s' "${OPENWRT_REF}" | tr -cs 'A-Za-z0-9._-' '-' | sed 's/^-//;s/-$//')"
          cache_week="$(date -u +%G-W%V)"
          if [ -z "${safe_ref}" ]; then
            safe_ref="${source_short}"
          fi
          release_tag="xr1710g-${safe_ref}-${source_short}"

          {
            printf 'source_commit=%s\n' "${source_commit}"
            printf 'source_short=%s\n' "${source_short}"
            printf 'safe_ref=%s\n' "${safe_ref}"
            printf 'release_tag=%s\n' "${release_tag}"
            printf 'cache_week=%s\n' "${cache_week}"
          } >> "$GITHUB_OUTPUT"

      - name: Decide whether to build
        id: decision
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.source.outputs.release_tag }}
        run: |
          set -eu
          should_build=true
          skip_reason=""

          if [ "${GITHUB_EVENT_NAME}" = "schedule" ] && gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            should_build=false
            skip_reason="Release ${RELEASE_TAG} already exists; upstream source has not changed."
          fi

          printf 'should_build=%s\n' "${should_build}" >> "$GITHUB_OUTPUT"
          printf 'skip_reason=%s\n' "${skip_reason}" >> "$GITHUB_OUTPUT"
          if [ "${should_build}" = "true" ]; then
            echo "Building ${RELEASE_TAG}"
          else
            echo "${skip_reason}"
          fi

  skipped:
    name: Skip unchanged upstream
    runs-on: ubuntu-24.04-arm
    needs: check-upstream
    if: ${{ needs.check-upstream.outputs.should_build != 'true' }}
    steps:
      - name: Report skip
        run: echo "${{ needs.check-upstream.outputs.skip_reason }}"

  build:
    name: Build ${{ needs.check-upstream.outputs.target_profile }} @ ${{ needs.check-upstream.outputs.openwrt_ref }}
    runs-on: ubuntu-24.04-arm
    needs: check-upstream
    if: ${{ needs.check-upstream.outputs.should_build == 'true' }}
    timeout-minutes: 720
    concurrency:
      group: openwrt-xr1710g-build
      cancel-in-progress: false
    env:
      SOURCE_DIR: openwrt
      OPENWRT_REPO: ${{ needs.check-upstream.outputs.openwrt_repo }}
      OPENWRT_REF: ${{ needs.check-upstream.outputs.openwrt_ref }}
      OPENWRT_SOURCE_COMMIT: ${{ needs.check-upstream.outputs.source_commit }}
      OPENWRT_SOURCE_SHORT: ${{ needs.check-upstream.outputs.source_short }}
      RELEASE_TAG: ${{ needs.check-upstream.outputs.release_tag }}
      TARGET_PROFILE: ${{ needs.check-upstream.outputs.target_profile }}
      WIRELESS_COUNTRY_CODE: ${{ needs.check-upstream.outputs.wireless_country }}
      FIX_5G_CHANNEL: ${{ needs.check-upstream.outputs.fix_5g_channel }}
      EXTRA_CONFIG: ${{ needs.check-upstream.outputs.extra_config }}
      CREATE_RELEASE: ${{ needs.check-upstream.outputs.create_release }}
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 2G
      TOOLCHAIN_CACHE_VERSION: v2

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          set -eux
          timeout 180s sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          timeout 60s docker system prune -af || true
          df -h

      - name: Install build dependencies
        run: |
          set -eux
          sudo find /etc/apt/sources.list.d -type f \
            \( -iname '*azure*' -o -iname '*microsoft*' \) \
            -print -exec sudo sed -i 's/^[[:space:]]*deb /# disabled for OpenWrt build: deb /' {} \;
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib \
            g++-multilib gettext git libncurses-dev libssl-dev \
            python3 python3-setuptools rsync swig unzip zlib1g-dev \
            file wget curl ccache libelf-dev device-tree-compiler \
            python3-ply python3-pyelftools qemu-utils zstd

      - name: Clone OpenWrt source on Linux
        run: |
          set -eux
          mkdir -p "${SOURCE_DIR}"
          git -C "${SOURCE_DIR}" init
          git -C "${SOURCE_DIR}" remote add origin "${OPENWRT_REPO}"
          git -C "${SOURCE_DIR}" fetch --depth 1 origin "${OPENWRT_SOURCE_COMMIT}" || \
            git -C "${SOURCE_DIR}" fetch --depth 1 origin "${OPENWRT_REF}"
          git -C "${SOURCE_DIR}" checkout --force "${OPENWRT_SOURCE_COMMIT}"
          git -C "${SOURCE_DIR}" log -1 --oneline

      - name: Add XR1710G device support
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          if grep -q '^define Device/gemtek_xr1710g-ubi$' target/linux/airoha/image/an7581.mk; then
            echo "XR1710G device profile already exists in source."
            exit 0
          fi

          support_dir="${RUNNER_TEMP}/xr1710g-support"
          rm -rf "${support_dir}"
          git clone --depth 1 --filter=blob:none --sparse --branch xr1710g \
            https://github.com/hurrian/openwrt-w1700k.git "${support_dir}"
          git -C "${support_dir}" sparse-checkout set --no-cone \
            target/linux/airoha/image/an7581.mk \
            target/linux/airoha/dts/an7581-xr1710g-ubi.dts \
            target/linux/airoha/dts/an7581-gemtek-17xx-common.dtsi \
            target/linux/airoha/an7581/base-files

          install -m 0644 "${support_dir}/target/linux/airoha/dts/an7581-xr1710g-ubi.dts" target/linux/airoha/dts/
          install -m 0644 "${support_dir}/target/linux/airoha/dts/an7581-gemtek-17xx-common.dtsi" target/linux/airoha/dts/
          mkdir -p target/linux/airoha/an7581/base-files
          cp -a "${support_dir}/target/linux/airoha/an7581/base-files/." target/linux/airoha/an7581/base-files/
          if ! grep -q '^define Build/an7581-chainloader$' target/linux/airoha/image/an7581.mk; then
            {
              printf '\n'
              awk '$0 == "define Build/an7581-chainloader" { show = 1 } show { print } $0 == "endef" && show { exit }' \
                "${support_dir}/target/linux/airoha/image/an7581.mk"
            } >> target/linux/airoha/image/an7581.mk
          fi
          if ! grep -q '^define Device/gemtek_17xx-common$' target/linux/airoha/image/an7581.mk; then
            {
              printf '\n'
              awk '$0 == "define Device/gemtek_17xx-common" { show = 1 } show { print } $0 == "endef" && show { exit }' \
                "${support_dir}/target/linux/airoha/image/an7581.mk"
            } >> target/linux/airoha/image/an7581.mk
          fi
          {
            printf '\n'
            awk '$0 == "define Device/gemtek_xr1710g-ubi" { show = 1 } show { print } $0 == "TARGET_DEVICES += gemtek_xr1710g-ubi" && show { exit }' \
              "${support_dir}/target/linux/airoha/image/an7581.mk"
          } >> target/linux/airoha/image/an7581.mk

          grep -q '^define Device/gemtek_xr1710g-ubi$' target/linux/airoha/image/an7581.mk
          grep -q '^define Device/gemtek_17xx-common$' target/linux/airoha/image/an7581.mk
          grep -q '^define Build/an7581-chainloader$' target/linux/airoha/image/an7581.mk

      - name: Apply XR1710G reference device package overrides
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          image_file="target/linux/airoha/image/an7581.mk"
          grep -q '^define Device/gemtek_xr1710g-ubi$' "${image_file}"
          if awk '$0 == "define Device/gemtek_xr1710g-ubi" { show = 1 } show { print } $0 == "endef" && show { exit }' "${image_file}" | grep -Fq '$(Device/gemtek_17xx-common)'; then
            awk '$0 == "define Device/gemtek_xr1710g-ubi" { show = 1 } show { print } $0 == "endef" && show { exit }' "${image_file}"
            echo "Using upstream Gemtek XR1710G package set."
            exit 0
          fi
          tmp_file="$(mktemp)"
          awk '
            function print_xr1710g_packages() {
              print "  DEVICE_PACKAGES := -airoha-en7581-npu-firmware \\"
              print "                    -kmod-input-gpio-keys-polled -kmod-leds-pwm \\"
              print "                    -kmod-pwm-airoha \\"
              print "                    airoha-en7581-mt7996-npu-firmware \\"
              print "                    fitblk kmod-i2c-an7581 kmod-hwmon-nct7802 \\"
              print "                    kmod-mt7996-firmware kmod-phy-realtek \\"
              print "                    rtl8261n-firmware \\"
              print "                    wpad-openssl"
            }
            /^define Device\/gemtek_xr1710g-ubi$/ {
              in_device = 1
              saw_packages = 0
              print
              next
            }
            in_device && /^endef$/ {
              if (!saw_packages) {
                print_xr1710g_packages()
              }
              in_device = 0
              skip_continuation = 0
              print
              next
            }
            in_device && skip_continuation {
              if ($0 !~ /\\$/) {
                skip_continuation = 0
              }
              next
            }
            in_device && /^[[:space:]]*DEVICE_PACKAGES[[:space:]]*:=/ {
              print_xr1710g_packages()
              saw_packages = 1
              if ($0 ~ /\\$/) {
                skip_continuation = 1
              }
              next
            }
            { print }
          ' "${image_file}" > "${tmp_file}"
          mv "${tmp_file}" "${image_file}"
          sed -n '/^define Device\/gemtek_xr1710g-ubi$/,/^endef$/p' "${image_file}"
          grep -q -- '-kmod-pwm-airoha' "${image_file}"
          grep -q 'airoha-en7581-mt7996-npu-firmware' "${image_file}"

      - name: Drop XR1710G chainloader artifact from system firmware profile
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          image_file="target/linux/airoha/image/an7581.mk"
          sed -i '/^[[:space:]]*ARTIFACT\/chainload-uboot\.itb := an7581-chainloader gemtek_xr1710g$/d' "${image_file}"
          sed -n '/^define Device\/gemtek_xr1710g-ubi$/,/^endef$/p' "${image_file}"
          if sed -n '/^define Device\/gemtek_xr1710g-ubi$/,/^endef$/p' "${image_file}" | grep -q 'ARTIFACT/chainload-uboot.itb'; then
            echo "XR1710G system firmware profile still contains a chainloader artifact."
            exit 1
          fi

      - name: Drop XR1710G AFE DTS override when base DTS lacks AFE
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          dts_file="target/linux/airoha/dts/an7581-xr1710g-ubi.dts"
          test -f "${dts_file}"
          if grep -Rqs '^[[:space:]]*afe:' target/linux/airoha/dts; then
            echo "Base DTS defines afe label; keeping XR1710G AFE override."
            exit 0
          fi

          if grep -q '^&afe[[:space:]]*{' "${dts_file}"; then
            awk '
              /^&afe[[:space:]]*\{/ {
                skip = 1
                depth = 1
                next
              }
              skip {
                depth += gsub(/\{/, "{")
                depth -= gsub(/\}/, "}")
                if (depth <= 0 && $0 ~ /};/) {
                  skip = 0
                }
                next
              }
              { print }
            ' "${dts_file}" > "${dts_file}.tmp"
            mv "${dts_file}.tmp" "${dts_file}"
          fi
          ! grep -q '^&afe[[:space:]]*{' "${dts_file}"

      - name: Add Airoha offload sk_buff kernel patch
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          patch_file="target/linux/airoha/patches-6.6/999-fix-airoha-offload-skbuff-include.patch"
          mkdir -p "$(dirname "${patch_file}")"
          cat > "${patch_file}" <<'EOF'
          --- a/include/linux/soc/airoha/airoha_offload.h
          +++ b/include/linux/soc/airoha/airoha_offload.h
          @@ -9,2 +9,3 @@
           #include <linux/spinlock.h>
          +#include <linux/skbuff.h>
           #include <linux/workqueue.h>
          EOF
          grep -n -A8 -B2 'skbuff.h' "${patch_file}"

      - name: Add Airoha PWM Linux 6.6 compatibility patch
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          patch_file="target/linux/airoha/patches-6.6/999-fix-airoha-pwm-linux66-api.patch"
          mkdir -p "$(dirname "${patch_file}")"
          cat > "${patch_file}" <<'EOF'
          --- a/drivers/pwm/pwm-airoha.c
          +++ b/drivers/pwm/pwm-airoha.c
          @@ -26,6 +26,7 @@
           #include <linux/platform_device.h>
           #include <linux/pwm.h>
           #include <linux/regmap.h>
          +#include <linux/slab.h>
           #include <linux/types.h>
           
           #define AIROHA_PWM_REG_SGPIO_LED_DATA		0x0024
          @@ -88,6 +89,7 @@
           };
           
           struct airoha_pwm {
          +	struct pwm_chip chip;
           	struct regmap *regmap;
           
           	DECLARE_BITMAP(initialized, AIROHA_PWM_MAX_CHANNELS);
          @@ -97,6 +99,11 @@
           	/* Cache bucket used by each pwm channel */
           	u8 channel_bucket[AIROHA_PWM_MAX_CHANNELS];
           };
          +
          +static inline struct airoha_pwm *to_airoha_pwm(struct pwm_chip *chip)
          +{
          +	return container_of(chip, struct airoha_pwm, chip);
          +}
           
           /* The PWM hardware supports periods between 4 ms and 1 s */
           #define AIROHA_PWM_PERIOD_TICK_NS	(4 * NSEC_PER_MSEC)
          @@ -155,7 +162,7 @@
           	 * and period_ns is clamped to AIROHA_PWM_PERIOD_MAX_NS and fit in a
           	 * u64.
           	 */
          -	return DIV_U64_ROUND_UP(duty_tick * period_ns, AIROHA_PWM_DUTY_FULL);
          +	return DIV64_U64_ROUND_UP(duty_tick * period_ns, AIROHA_PWM_DUTY_FULL);
           }
           
           static int airoha_pwm_get_bucket(struct airoha_pwm *pc, int bucket,
          @@ -505,7 +512,7 @@
           static int airoha_pwm_apply(struct pwm_chip *chip, struct pwm_device *pwm,
           			    const struct pwm_state *state)
           {
          -	struct airoha_pwm *pc = pwmchip_get_drvdata(chip);
          +	struct airoha_pwm *pc = to_airoha_pwm(chip);
           	u32 period_ticks, duty_ticks;
           	u32 period_ns, duty_ns;
           
          @@ -546,7 +553,7 @@
           static int airoha_pwm_get_state(struct pwm_chip *chip, struct pwm_device *pwm,
           				struct pwm_state *state)
           {
          -	struct airoha_pwm *pc = pwmchip_get_drvdata(chip);
          +	struct airoha_pwm *pc = to_airoha_pwm(chip);
           	int ret, hwpwm = pwm->hwpwm;
           	u32 addr, shift, val;
           	u8 bucket;
          @@ -580,12 +587,15 @@
           	struct pwm_chip *chip;
           	int ret;
           
          -	chip = devm_pwmchip_alloc(dev, AIROHA_PWM_MAX_CHANNELS, sizeof(*pc));
          -	if (IS_ERR(chip))
          -		return PTR_ERR(chip);
          +	pc = devm_kzalloc(dev, sizeof(*pc), GFP_KERNEL);
          +	if (!pc)
          +		return -ENOMEM;
           
          +	chip = &pc->chip;
          +	chip->dev = dev;
           	chip->ops = &airoha_pwm_ops;
          -	pc = pwmchip_get_drvdata(chip);
          +	chip->npwm = AIROHA_PWM_MAX_CHANNELS;
          +	chip->base = -1;
           
           	pc->regmap = device_node_to_regmap(dev_of_node(dev->parent));
           	if (IS_ERR(pc->regmap))
          EOF
          grep -n -A8 -B2 'devm_kzalloc\|DIV64_U64_ROUND_UP' "${patch_file}"

      - name: Seed Airoha kernel config defaults
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          kernel_config="$(
            find "target/linux/${TARGET}/${SUBTARGET}" -maxdepth 1 -type f -name 'config-*' \
              | sort -V \
              | tail -n 1
          )"
          test -n "${kernel_config}"
          if ! grep -Eq '^(CONFIG_SND_SOC_AN7581=|# CONFIG_SND_SOC_AN7581 is not set)' "${kernel_config}"; then
            printf '\n# CONFIG_SND_SOC_AN7581 is not set\n' >> "${kernel_config}"
          fi
          grep -n 'SND_SOC_AN7581' "${kernel_config}"

      - name: Restore downloads and ccache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.SOURCE_DIR }}/dl
            ${{ env.CCACHE_DIR }}
          key: xr1710g-${{ runner.os }}-${{ needs.check-upstream.outputs.safe_ref }}-${{ hashFiles('.github/workflows/build-openwrt-xr1710g.yml') }}
          restore-keys: |
            xr1710g-${{ runner.os }}-${{ needs.check-upstream.outputs.safe_ref }}-
            xr1710g-${{ runner.os }}-

      - name: Restore weekly toolchain cache
        id: toolchain-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.SOURCE_DIR }}/staging_dir/host
            ${{ env.SOURCE_DIR }}/staging_dir/hostpkg
            ${{ env.SOURCE_DIR }}/staging_dir/toolchain-*
            ${{ env.SOURCE_DIR }}/build_dir/toolchain-*
          key: xr1710g-toolchain-${{ env.TOOLCHAIN_CACHE_VERSION }}-${{ runner.os }}-${{ needs.check-upstream.outputs.safe_ref }}-${{ needs.check-upstream.outputs.source_short }}-${{ needs.check-upstream.outputs.target_profile }}-${{ needs.check-upstream.outputs.cache_week }}
          restore-keys: |
            xr1710g-toolchain-${{ env.TOOLCHAIN_CACHE_VERSION }}-${{ runner.os }}-${{ needs.check-upstream.outputs.safe_ref }}-${{ needs.check-upstream.outputs.source_short }}-${{ needs.check-upstream.outputs.target_profile }}-

      - name: Import released toolchain when cache is unavailable
        id: released-toolchain
        if: ${{ steps.toolchain-cache.outputs.cache-hit != 'true' && steps.toolchain-cache.outputs.cache-matched-key == '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TOOLCHAIN_TAG_PREFIX: xr1710g-toolchain-${{ env.TOOLCHAIN_CACHE_VERSION }}-${{ needs.check-upstream.outputs.safe_ref }}-${{ needs.check-upstream.outputs.source_short }}-${{ needs.check-upstream.outputs.target_profile }}-
        run: |
          set -eu
          mkdir -p toolchain-release
          tag="$(gh release list --limit 100 --json tagName,isDraft --jq '.[] | select(.isDraft == false) | .tagName' | grep -m1 "^${TOOLCHAIN_TAG_PREFIX}" || true)"

          if [ -z "${tag}" ]; then
            echo "No released toolchain matched ${TOOLCHAIN_TAG_PREFIX}; falling back to normal build."
            echo "release_toolchain_hit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! gh release download "${tag}" --pattern 'openwrt-xr1710g-toolchain-*.tar.zst' --dir toolchain-release; then
            echo "Release ${tag} has no downloadable toolchain archive; falling back to normal build."
            echo "release_toolchain_hit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          archive="$(find toolchain-release -maxdepth 1 -name 'openwrt-xr1710g-toolchain-*.tar.zst' -type f | sort | head -n 1)"
          if [ -z "${archive}" ]; then
            echo "No toolchain archive was downloaded; falling back to normal build."
            echo "release_toolchain_hit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tar -I zstd -xf "${archive}" -C "${SOURCE_DIR}"
          echo "Imported released toolchain from ${tag}: ${archive}"
          echo "release_toolchain_hit=true" >> "$GITHUB_OUTPUT"
          echo "release_toolchain_tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Report toolchain import status
        env:
          CACHE_HIT: ${{ steps.toolchain-cache.outputs.cache-hit }}
          CACHE_MATCHED_KEY: ${{ steps.toolchain-cache.outputs.cache-matched-key }}
          RELEASE_TOOLCHAIN_HIT: ${{ steps.released-toolchain.outputs.release_toolchain_hit }}
          RELEASE_TOOLCHAIN_TAG: ${{ steps.released-toolchain.outputs.release_toolchain_tag }}
        run: |
          set -eu
          if [ "${CACHE_HIT}" = "true" ] || [ -n "${CACHE_MATCHED_KEY}" ]; then
            echo "Imported prebuilt toolchain from cache: ${CACHE_MATCHED_KEY:-exact key}"
          elif [ "${RELEASE_TOOLCHAIN_HIT}" = "true" ]; then
            echo "Imported prebuilt toolchain from release: ${RELEASE_TOOLCHAIN_TAG}"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            echo "No prebuilt toolchain was available after the toolchain workflow; automatic firmware build will stop."
          else
            echo "No prebuilt toolchain was available; continuing with normal OpenWrt build."
          fi

      - name: Require prebuilt toolchain after toolchain workflow
        if: ${{ github.event_name == 'workflow_run' && steps.toolchain-cache.outputs.cache-hit != 'true' && steps.toolchain-cache.outputs.cache-matched-key == '' && steps.released-toolchain.outputs.release_toolchain_hit != 'true' }}
        run: |
          echo "The toolchain workflow succeeded, but no matching toolchain cache or release was found."
          echo "Expected profile: ${{ needs.check-upstream.outputs.target_profile }}"
          echo "Expected source: ${{ needs.check-upstream.outputs.safe_ref }} / ${{ needs.check-upstream.outputs.source_short }}"
          echo "Stopping here so the firmware job does not rebuild the toolchain and hit the binutils off64_t failure again."
          exit 1

      - name: Update and install feeds
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Fix libffi generated header lookup
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          libffi_makefile="feeds/packages/libs/libffi/Makefile"
          if [ -f "${libffi_makefile}" ]; then
            perl -0pi -e 's#^[ \t]*\$\(CP\)[ \t]*\\\n[ \t]*\$\(PKG_BUILD_DIR\)/\$\(GNU_TARGET_NAME\)\*/fficonfig\.h[ \t]*\\\n[ \t]*\$\(1\)/usr/include/#\tfind \$(PKG_BUILD_DIR) -name fficonfig.h -exec \$(CP) {} \$(1)/usr/include/ \\; -quit#ms; s#^[ \t]*\$\(CP\) .*/fficonfig\.h .*$#\tfind \$(PKG_BUILD_DIR) -name fficonfig.h -exec \$(CP) {} \$(1)/usr/include/ \\; -quit#m' "${libffi_makefile}"
            if grep -Fq '$(GNU_TARGET_NAME)*/fficonfig.h' "${libffi_makefile}"; then
              echo "libffi fficonfig.h lookup was not patched"
              sed -n '70,85p' "${libffi_makefile}"
              exit 1
            fi
            grep -n -A2 -B2 'fficonfig.h' "${libffi_makefile}"
          fi

      - name: Add OpenClash package
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          if [ ! -d package/OpenClash ]; then
            git clone --depth 1 https://github.com/vernesong/OpenClash.git package/OpenClash
          fi

      - name: Add MLO LuCI package
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          if [ ! -d package/luci-app-mlo ]; then
            git clone --depth 1 https://github.com/YYH2913/luci-app-mlo.git package/luci-app-mlo
          fi

      - name: Add Airoha NPU LuCI package
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          if [ ! -d package/luci-app-airoha-npu ]; then
            git clone --depth 1 https://github.com/rchen14b/luci-app-airoha-npu.git package/luci-app-airoha-npu
          fi
          sed -i 's#^include \.\./\.\./luci\.mk#include $(TOPDIR)/feeds/luci/luci.mk#' package/luci-app-airoha-npu/Makefile

      - name: Add W1700K fancontrol package
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          if [ ! -d package/luci-app-w1700k-fancontrol ]; then
            git clone --depth 1 https://github.com/rchen14b/luci-app-w1700k-fancontrol.git package/luci-app-w1700k-fancontrol
          fi
          sed -i 's#^include \.\./\.\./luci\.mk#include $(TOPDIR)/feeds/luci/luci.mk#' package/luci-app-w1700k-fancontrol/Makefile

      - name: Add XR1710G first-boot defaults
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          fix_5g_default=0
          if [ "${FIX_5G_CHANNEL}" != "false" ]; then
            fix_5g_default=1
          fi

          mkdir -p files/etc/uci-defaults
          cat > files/etc/uci-defaults/99-xr1710g-wireless-defaults <<'EOF'
          #!/bin/sh
          # Keep hostapd away from the invalid "00" regulatory domain.
          country="${WIRELESS_COUNTRY:-__WIRELESS_COUNTRY__}"
          channel_5g="${XR1710G_5G_CHANNEL:-36}"
          fix_5g="${XR1710G_FIX_5G_CHANNEL:-__FIX_5G_DEFAULT__}"

          for radio in $(uci -q show wireless | sed -n "s/^\(wireless\.[^.]*\)=wifi-device.*/\1/p"); do
            uci -q set "${radio}.country=${country}"
          done

          if [ "${fix_5g}" = "1" ]; then
            for radio in $(uci -q show wireless | sed -n "s/^\(wireless\.[^.]*\)=wifi-device.*/\1/p"); do
              band="$(uci -q get "${radio}.band" || true)"
              hwmode="$(uci -q get "${radio}.hwmode" || true)"
              htmode="$(uci -q get "${radio}.htmode" || true)"

              case "${band}:${hwmode}:${htmode}" in
                5g:*|*:11a:*|*:a:*)
                  uci -q set "${radio}.channel=${channel_5g}"
                  ;;
              esac
            done
          fi

          uci -q commit wireless
          exit 0
          EOF
          sed -i "s/__WIRELESS_COUNTRY__/${WIRELESS_COUNTRY_CODE}/g" files/etc/uci-defaults/99-xr1710g-wireless-defaults
          sed -i "s/__FIX_5G_DEFAULT__/${fix_5g_default}/g" files/etc/uci-defaults/99-xr1710g-wireless-defaults
          chmod +x files/etc/uci-defaults/99-xr1710g-wireless-defaults

      - name: Write build config
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          profile="${TARGET_PROFILE}"
          case "${profile}" in
            gemtek_xr1710g) profile="gemtek_xr1710g-ubi" ;;
          esac

          cat > .config <<EOF
          CONFIG_TARGET_${TARGET}=y
          CONFIG_TARGET_${TARGET}_${SUBTARGET}=y
          CONFIG_TARGET_${TARGET}_${SUBTARGET}_DEVICE_${profile}=y
          CONFIG_CCACHE=y
          CONFIG_JSON_OVERVIEW_IMAGE_INFO=y
          CONFIG_KERNEL_BUILD_DOMAIN="github-actions"
          CONFIG_KERNEL_BUILD_USER="builder"
          # CONFIG_PACKAGE_dnsmasq is not set
          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_irqbalance=y
          CONFIG_PACKAGE_jq=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-app-airoha-npu=y
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-mlo=y
          CONFIG_PACKAGE_luci-app-package-manager=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-irqbalance=y
          CONFIG_PACKAGE_luci-app-w1700k-fancontrol=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-proto-ipv6=y
          CONFIG_PACKAGE_luci-proto-ppp=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_ttyd=y
          # CONFIG_TARGET_ROOTFS_INITRAMFS is not set
          EOF

          if [ -n "${EXTRA_CONFIG}" ]; then
            printf '%s\n' "${EXTRA_CONFIG}" >> .config
          fi

          if [ "${FIX_5G_CHANNEL}" != "false" ]; then
            cat >> .config <<'EOF'
          CONFIG_PACKAGE_wireless-regdb=y
          EOF
          fi

          grep -q "^CONFIG_TARGET_${TARGET}_${SUBTARGET}_DEVICE_${profile}=y$" .config
          make defconfig
          grep -q "^CONFIG_TARGET_${TARGET}_${SUBTARGET}_DEVICE_${profile}=y$" .config || {
            echo "Device profile was not accepted by OpenWrt Kconfig: ${profile}"
            grep "^CONFIG_TARGET_${TARGET}_${SUBTARGET}_DEVICE_" .config || true
            exit 1
          }
          for pkg in luci-app-openclash luci-app-mlo luci-app-airoha-npu luci-app-w1700k-fancontrol; do
            grep -q "^CONFIG_PACKAGE_${pkg}=y$" .config || {
              echo "Required package was not selected by OpenWrt Kconfig: ${pkg}"
              exit 1
            }
          done

      - name: Download package sources
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          make download -j"$(nproc)"
          find dl -size -1024c -type f -print -delete

      - name: Compile firmware
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -o pipefail
          nproc
          make -j"$(nproc)" || make -j1 V=s

      - name: Collect firmware artifacts
        id: collect
        run: |
          set -eux
          outdir="artifacts/xr1710g"
          bindir="${SOURCE_DIR}/bin/targets/${TARGET}/${SUBTARGET}"
          mkdir -p "${outdir}"

          cp -a "${bindir}"/*.itb "${outdir}/" 2>/dev/null || true
          cp -a "${bindir}"/*.img "${outdir}/" 2>/dev/null || true
          cp -a "${bindir}"/*.bin "${outdir}/" 2>/dev/null || true
          cp -a "${bindir}"/profiles.json "${outdir}/" 2>/dev/null || true
          cp -a "${bindir}"/sha256sums "${outdir}/upstream-sha256sums" 2>/dev/null || true
          cp -a "${SOURCE_DIR}/.config" "${outdir}/openwrt-xr1710g-firmware.config"

          find "${outdir}" -maxdepth 1 -name '*sysupgrade.itb' -type f | grep -q . || {
            echo "No XR1710G sysupgrade.itb artifact was found in ${bindir}"
            find "${bindir}" -maxdepth 1 -type f -printf '%f\n' | sort
            exit 1
          }

          {
            echo "OpenWrt repo: ${OPENWRT_REPO}"
            echo "OpenWrt ref: ${OPENWRT_REF}"
            echo "OpenWrt commit: ${OPENWRT_SOURCE_COMMIT}"
            echo "Target: ${TARGET}/${SUBTARGET}"
            echo "Profile: ${TARGET_PROFILE}"
            echo "Build time: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S %z')"
            echo "Wireless country default: ${WIRELESS_COUNTRY_CODE}"
            echo "5 GHz non-DFS default channel enabled: ${FIX_5G_CHANNEL}"
            echo
            echo "For XR1710G HTTP Recovery, use the *-sysupgrade.itb image."
            echo "Do not flash raw U-Boot artifacts from a system firmware build."
          } > "${outdir}/BUILDINFO.txt"

          (cd "${outdir}" && find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS)
          find "${outdir}" -maxdepth 1 -type f -printf '%f\n' | sort
          echo "artifact_dir=${outdir}" >> "$GITHUB_OUTPUT"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-xr1710g-${{ github.run_number }}
          path: ${{ steps.collect.outputs.artifact_dir }}
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release
        if: ${{ env.CREATE_RELEASE == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eux
          tag="${RELEASE_TAG}"
          build_time="$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S %z')"
          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "Release ${tag} already exists; skipping duplicate release."
            exit 0
          fi
          gh release create "${tag}" artifacts/xr1710g/* \
            --title "路由器固件 ${build_time}" \
            --notes-file artifacts/xr1710g/BUILDINFO.txt

      - name: Clean firmware release staging files
        if: ${{ env.CREATE_RELEASE == 'true' }}
        run: |
          set -eux
          rm -rf \
            artifacts/xr1710g \
            toolchain-release

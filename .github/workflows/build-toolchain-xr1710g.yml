name: Build OpenWrt XR1710G Toolchain

on:
  schedule:
    - cron: "47 18 * * 0"
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-toolchain-xr1710g.yml
  workflow_dispatch:
    inputs:
      openwrt_repo:
        description: OpenWrt/ImmortalWrt source repository
        required: true
        default: https://github.com/immortalwrt/immortalwrt.git
      openwrt_ref:
        description: OpenWrt branch, tag, or commit
        required: true
        default: openwrt-24.10
      target_profile:
        description: OpenWrt device profile
        required: true
        default: econet_xr1710g-ubi
      extra_config:
        description: Extra OpenWrt .config lines, one per line
        required: false
        default: ""
      create_release:
        description: Publish toolchain archive as a GitHub Release
        required: true
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: openwrt-xr1710g-toolchain
  cancel-in-progress: false

env:
  SOURCE_DIR: openwrt
  TARGET: airoha
  SUBTARGET: an7581
  OPENWRT_REPO: ${{ inputs.openwrt_repo || 'https://github.com/immortalwrt/immortalwrt.git' }}
  OPENWRT_REF: ${{ inputs.openwrt_ref || 'openwrt-24.10' }}
  TARGET_PROFILE: ${{ inputs.target_profile || 'econet_xr1710g-ubi' }}
  EXTRA_CONFIG: ${{ inputs.extra_config || '' }}
  CREATE_RELEASE: ${{ github.event_name == 'workflow_dispatch' && format('{0}', inputs.create_release) || 'true' }}
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 2G

jobs:
  toolchain:
    name: Toolchain ${{ inputs.target_profile || 'econet_xr1710g-ubi' }} @ ${{ inputs.openwrt_ref || 'openwrt-24.10' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          set -eux
          timeout 180s sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          timeout 60s docker system prune -af || true
          df -h

      - name: Install build dependencies
        run: |
          set -eux
          sudo find /etc/apt/sources.list.d -type f \
            \( -iname '*azure*' -o -iname '*microsoft*' \) \
            -print -exec sudo sed -i 's/^[[:space:]]*deb /# disabled for OpenWrt build: deb /' {} \;
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib \
            g++-multilib gettext git libncurses-dev libssl-dev \
            python3 python3-setuptools rsync swig unzip zlib1g-dev \
            file wget curl ccache libelf-dev device-tree-compiler \
            python3-ply python3-pyelftools qemu-utils zstd

      - name: Clone OpenWrt source on Linux
        id: source
        run: |
          set -eux
          mkdir -p "${SOURCE_DIR}"
          git -C "${SOURCE_DIR}" init
          git -C "${SOURCE_DIR}" remote add origin "${OPENWRT_REPO}"
          git -C "${SOURCE_DIR}" fetch --depth 1 origin "${OPENWRT_REF}"
          git -C "${SOURCE_DIR}" checkout --force FETCH_HEAD
          git -C "${SOURCE_DIR}" log -1 --oneline

          source_commit="$(git -C "${SOURCE_DIR}" rev-parse HEAD)"
          source_short="$(git -C "${SOURCE_DIR}" rev-parse --short=12 HEAD)"
          safe_ref="$(printf '%s' "${OPENWRT_REF}" | tr -cs 'A-Za-z0-9._-' '-' | sed 's/^-//;s/-$//')"
          cache_week="$(date -u +%G-W%V)"
          if [ -z "${safe_ref}" ]; then
            safe_ref="${source_short}"
          fi

          {
            printf 'source_commit=%s\n' "${source_commit}"
            printf 'source_short=%s\n' "${source_short}"
            printf 'safe_ref=%s\n' "${safe_ref}"
            printf 'cache_week=%s\n' "${cache_week}"
          } >> "$GITHUB_OUTPUT"

      - name: Add XR1710G device support
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          if grep -q '^define Device/econet_xr1710g-ubi$' target/linux/airoha/image/an7581.mk; then
            echo "XR1710G device profile already exists in source."
            exit 0
          fi

          support_dir="${RUNNER_TEMP}/xr1710g-support"
          rm -rf "${support_dir}"
          git clone --depth 1 --filter=blob:none --sparse --branch xr1710g \
            https://github.com/YYH2913/openwrt.git "${support_dir}"
          git -C "${support_dir}" sparse-checkout set --no-cone \
            target/linux/airoha/image/an7581.mk \
            target/linux/airoha/dts/an7581-xr1710g-ubi.dts \
            target/linux/airoha/an7581/base-files

          install -m 0644 "${support_dir}/target/linux/airoha/dts/an7581-xr1710g-ubi.dts" target/linux/airoha/dts/
          mkdir -p target/linux/airoha/an7581/base-files
          cp -a "${support_dir}/target/linux/airoha/an7581/base-files/." target/linux/airoha/an7581/base-files/
          {
            printf '\n'
            awk '/^define Device\/econet_xr1710g-ubi$/,/^TARGET_DEVICES \+= econet_xr1710g-ubi$/' \
              "${support_dir}/target/linux/airoha/image/an7581.mk"
          } >> target/linux/airoha/image/an7581.mk

          grep -q '^define Device/econet_xr1710g-ubi$' target/linux/airoha/image/an7581.mk

      - name: Add Airoha offload sk_buff kernel patch
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          patch_file="target/linux/airoha/patches-6.6/999-fix-airoha-offload-skbuff-include.patch"
          mkdir -p "$(dirname "${patch_file}")"
          cat > "${patch_file}" <<'EOF'
          --- a/include/linux/soc/airoha/airoha_offload.h
          +++ b/include/linux/soc/airoha/airoha_offload.h
          @@ -9,2 +9,3 @@
           #include <linux/spinlock.h>
          +#include <linux/skbuff.h>
           #include <linux/workqueue.h>
          EOF
          grep -n -A8 -B2 'skbuff.h' "${patch_file}"

      - name: Seed Airoha kernel config defaults
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          kernel_config="target/linux/airoha/config-6.6"
          test -f "${kernel_config}"
          if ! grep -Eq '^(CONFIG_SND_SOC_AN7581=|# CONFIG_SND_SOC_AN7581 is not set)' "${kernel_config}"; then
            printf '\n# CONFIG_SND_SOC_AN7581 is not set\n' >> "${kernel_config}"
          fi
          grep -n 'SND_SOC_AN7581' "${kernel_config}"

      - name: Restore downloads and ccache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.SOURCE_DIR }}/dl
            ${{ env.CCACHE_DIR }}
          key: xr1710g-${{ runner.os }}-${{ steps.source.outputs.safe_ref }}-toolchain-${{ hashFiles('.github/workflows/build-toolchain-xr1710g.yml') }}
          restore-keys: |
            xr1710g-${{ runner.os }}-${{ steps.source.outputs.safe_ref }}-
            xr1710g-${{ runner.os }}-

      - name: Update and install feeds
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Fix libffi generated header lookup
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          libffi_makefile="feeds/packages/libs/libffi/Makefile"
          if [ -f "${libffi_makefile}" ]; then
            perl -0pi -e 's#^[ \t]*\$\(CP\)[ \t]*\\\n[ \t]*\$\(PKG_BUILD_DIR\)/\$\(GNU_TARGET_NAME\)\*/fficonfig\.h[ \t]*\\\n[ \t]*\$\(1\)/usr/include/#\tfind \$(PKG_BUILD_DIR) -name fficonfig.h -exec \$(CP) {} \$(1)/usr/include/ \\; -quit#ms; s#^[ \t]*\$\(CP\) .*/fficonfig\.h .*$#\tfind \$(PKG_BUILD_DIR) -name fficonfig.h -exec \$(CP) {} \$(1)/usr/include/ \\; -quit#m' "${libffi_makefile}"
            if grep -Fq '$(GNU_TARGET_NAME)*/fficonfig.h' "${libffi_makefile}"; then
              echo "libffi fficonfig.h lookup was not patched"
              sed -n '70,85p' "${libffi_makefile}"
              exit 1
            fi
            grep -n -A2 -B2 'fficonfig.h' "${libffi_makefile}"
          fi

      - name: Add OpenClash package
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          if [ ! -d package/OpenClash ]; then
            git clone --depth 1 https://github.com/vernesong/OpenClash.git package/OpenClash
          fi

      - name: Add MLO LuCI package
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          if [ ! -d package/luci-app-mlo ]; then
            git clone --depth 1 https://github.com/YYH2913/luci-app-mlo.git package/luci-app-mlo
          fi

      - name: Add Airoha NPU LuCI package
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          if [ ! -d package/luci-app-airoha-npu ]; then
            git clone --depth 1 https://github.com/rchen14b/luci-app-airoha-npu.git package/luci-app-airoha-npu
          fi
          sed -i 's#^include \.\./\.\./luci\.mk#include $(TOPDIR)/feeds/luci/luci.mk#' package/luci-app-airoha-npu/Makefile

      - name: Add W1700K fancontrol package
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          if [ ! -d package/luci-app-w1700k-fancontrol ]; then
            git clone --depth 1 https://github.com/rchen14b/luci-app-w1700k-fancontrol.git package/luci-app-w1700k-fancontrol
          fi
          sed -i 's#^include \.\./\.\./luci\.mk#include $(TOPDIR)/feeds/luci/luci.mk#' package/luci-app-w1700k-fancontrol/Makefile

      - name: Write toolchain build config
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          profile="${TARGET_PROFILE}"

          cat > .config <<EOF
          CONFIG_TARGET_${TARGET}=y
          CONFIG_TARGET_${TARGET}_${SUBTARGET}=y
          CONFIG_TARGET_${TARGET}_${SUBTARGET}_DEVICE_${profile}=y
          CONFIG_ALL=y
          CONFIG_ALL_KMODS=y
          CONFIG_ALL_NONSHARED=y
          CONFIG_BUILDBOT=y
          CONFIG_CCACHE=y
          CONFIG_DEVEL=y
          CONFIG_IB=y
          CONFIG_JSON_OVERVIEW_IMAGE_INFO=y
          CONFIG_KERNEL_BUILD_DOMAIN="github-actions"
          CONFIG_KERNEL_BUILD_USER="builder"
          CONFIG_SDK=y
          # CONFIG_PACKAGE_dnsmasq is not set
          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_irqbalance=y
          CONFIG_PACKAGE_jq=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-app-airoha-npu=y
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-mlo=y
          CONFIG_PACKAGE_luci-app-package-manager=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-irqbalance=y
          CONFIG_PACKAGE_luci-app-w1700k-fancontrol=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-proto-ipv6=y
          CONFIG_PACKAGE_luci-proto-ppp=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_ttyd=y
          CONFIG_PACKAGE_wireless-regdb=y
          # CONFIG_TARGET_ROOTFS_INITRAMFS is not set
          EOF

          if [ -n "${EXTRA_CONFIG}" ]; then
            printf '%s\n' "${EXTRA_CONFIG}" >> .config
          fi

          grep -q "^CONFIG_TARGET_${TARGET}_${SUBTARGET}_DEVICE_${profile}=y$" .config
          make defconfig
          grep -q "^CONFIG_TARGET_${TARGET}_${SUBTARGET}_DEVICE_${profile}=y$" .config || {
            echo "Device profile was not accepted by OpenWrt Kconfig: ${profile}"
            grep "^CONFIG_TARGET_${TARGET}_${SUBTARGET}_DEVICE_" .config || true
            exit 1
          }
          for pkg in luci-app-openclash luci-app-mlo luci-app-airoha-npu luci-app-w1700k-fancontrol; do
            grep -q "^CONFIG_PACKAGE_${pkg}=y$" .config || {
              echo "Required package was not selected by OpenWrt Kconfig: ${pkg}"
              exit 1
            }
          done

      - name: Restore weekly toolchain cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.SOURCE_DIR }}/staging_dir/host
            ${{ env.SOURCE_DIR }}/staging_dir/hostpkg
            ${{ env.SOURCE_DIR }}/staging_dir/toolchain-*
            ${{ env.SOURCE_DIR }}/build_dir/toolchain-*
          key: xr1710g-toolchain-${{ runner.os }}-${{ steps.source.outputs.safe_ref }}-${{ steps.source.outputs.source_short }}-${{ env.TARGET_PROFILE }}-${{ steps.source.outputs.cache_week }}
          restore-keys: |
            xr1710g-toolchain-${{ runner.os }}-${{ steps.source.outputs.safe_ref }}-${{ steps.source.outputs.source_short }}-${{ env.TARGET_PROFILE }}-

      - name: Compile tools and toolchain
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -o pipefail
          nproc
          make -j"$(nproc)" tools/install toolchain/install || make -j1 V=s tools/install toolchain/install

      - name: Collect toolchain archive
        id: collect
        run: |
          set -eux
          outdir="artifacts/toolchain"
          archive="openwrt-xr1710g-toolchain-${{ steps.source.outputs.source_short }}-${{ steps.source.outputs.cache_week }}.tar.zst"
          mkdir -p "${outdir}"
          cp -a "${SOURCE_DIR}/.config" "${outdir}/openwrt-xr1710g-toolchain.config"

          tar_paths=()
          for pattern in \
            staging_dir/host \
            staging_dir/hostpkg \
            staging_dir/toolchain-* \
            build_dir/toolchain-*; do
            while IFS= read -r matched; do
              tar_paths+=("${matched#${SOURCE_DIR}/}")
            done < <(compgen -G "${SOURCE_DIR}/${pattern}" || true)
          done

          if [ "${#tar_paths[@]}" -eq 0 ]; then
            echo "No toolchain paths were found to archive."
            exit 1
          fi

          (cd "${SOURCE_DIR}" && tar -I 'zstd -T0 -19' -cf "${GITHUB_WORKSPACE}/${outdir}/${archive}" "${tar_paths[@]}")

          {
            echo "OpenWrt repo: ${OPENWRT_REPO}"
            echo "OpenWrt ref: ${OPENWRT_REF}"
            echo "OpenWrt commit: ${{ steps.source.outputs.source_commit }}"
            echo "Target: ${TARGET}/${SUBTARGET}"
            echo "Profile: ${TARGET_PROFILE}"
            echo "Build type: toolchain"
            echo "Build time: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S %z')"
            echo
            echo "Restore this archive into the OpenWrt source root before running a firmware build."
          } > "${outdir}/BUILDINFO-toolchain.txt"

          (cd "${outdir}" && find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS)
          find "${outdir}" -maxdepth 1 -type f -printf '%f\n' | sort
          echo "artifact_dir=${outdir}" >> "$GITHUB_OUTPUT"

      - name: Upload toolchain artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-xr1710g-toolchain-${{ github.run_number }}
          path: ${{ steps.collect.outputs.artifact_dir }}
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release
        if: ${{ env.CREATE_RELEASE == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eux
          build_time="$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S %z')"
          tag="xr1710g-toolchain-${{ steps.source.outputs.safe_ref }}-${{ steps.source.outputs.source_short }}-${{ steps.source.outputs.cache_week }}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "Release ${tag} already exists; skipping duplicate release."
            exit 0
          fi
          gh release create "${tag}" artifacts/toolchain/* \
            --title "toolchain ${build_time}" \
            --notes-file artifacts/toolchain/BUILDINFO-toolchain.txt
